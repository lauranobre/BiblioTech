<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BiblioTech - Cadastrar Cliente</title>
</head>
<body>
    <h1>BiblioTech - Novo Cadastro</h1>

    <header>
        <section class="navegacao">
            <nav>
                <ul>
                    <li><a href="index.html">Sair/Início</a></li>
                    <li><a href="gestaoClientes.html">Voltar para Gestão</a></li>
                </ul>
            </nav>
        </section>
    </header>

    <main>
        <section class="gestaoCliente">
            <h2>Cadastrar Novo Cliente</h2>
            <p>Insira os dados do cliente abaixo:</p>
            
            <form onsubmit="event.preventDefault(); CadastrarCliente();">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" required>

                <button type="submit">Cadastrar Cliente</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 BiblioTech. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
